name: Deploy to Scaleway
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Assistant Potager
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SCALEWAY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SCALEWAY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync code on server
        run: |
          ssh ${{ secrets.SCALEWAY_USER }}@${{ secrets.SCALEWAY_HOST }} "
            set -euo pipefail
            mkdir -p /opt/potager
            cd /opt/potager
            git fetch origin
            git checkout main
            git pull origin main
          "

      - name: Install dependencies
        run: |
          ssh ${{ secrets.SCALEWAY_USER }}@${{ secrets.SCALEWAY_HOST }} "
            set -euo pipefail
            cd /opt/potager
            python3 -m pip install --quiet --upgrade pip
            python3 -m pip install --quiet -r requirements.txt
          "

      - name: Apply SQL migrations
        run: |
          ssh ${{ secrets.SCALEWAY_USER }}@${{ secrets.SCALEWAY_HOST }} "
            set -euo pipefail
            cd /opt/potager
            set -a && source .env.prod && set +a
            for migration in migrations/migration_v*.sql; do
              echo \"Applying \${migration}...\"
              psql \"\${DATABASE_URL}\" -f \"\${migration}\" 2>/dev/null || true
            done
          "

      - name: Restart systemd service
        run: |
          ssh ${{ secrets.SCALEWAY_USER }}@${{ secrets.SCALEWAY_HOST }} \
            "sudo systemctl restart potager.service"

      - name: Smoke test
        run: |
          ssh ${{ secrets.SCALEWAY_USER }}@${{ secrets.SCALEWAY_HOST }} "
            set -euo pipefail
            echo 'Attente démarrage du service...'
            for i in \$(seq 1 12); do
              status=\$(systemctl is-active potager.service || true)
              if [ \"\${status}\" = 'active' ]; then
                if curl --fail --silent --max-time 5 http://localhost:8000/health | grep -q 'ok'; then
                  echo 'Déploiement réussi — @AssistantPotagerBot actif'
                  exit 0
                fi
              fi
              echo \"Tentative \${i}/12 — service: \${status}, attente 5s...\"
              sleep 5
            done
            echo 'ERREUR: service non opérationnel après 60s'
            systemctl status potager.service --no-pager
            exit 1
          "
