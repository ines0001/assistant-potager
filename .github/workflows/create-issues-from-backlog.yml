name: Create Issues from Backlog

on:
  push:
    paths:
      - 'backlog/*.md'
    branches:
      - main
  workflow_dispatch:

# ✅ AJOUTE CES PERMISSIONS
permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  create-issues:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create issues from backlog
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const backlogDir = './backlog';
            const files = fs.readdirSync(backlogDir).filter(f => f.endsWith('.md'));
            
            for (const file of files) {
              const filePath = path.join(backlogDir, file);
              const content = fs.readFileSync(filePath, 'utf8');
              
              const lines = content.split('\n');
              const title = lines[0].replace(/^#+\s+/, '').trim();
              const body = content;
              
              try {
                const existingIssues = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'all'
                });
                
                const issueExists = existingIssues.data.some(issue => 
                  issue.title === title
                );
                
                if (!issueExists) {
                  const issue = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: title,
                    body: body,
                    labels: ['backlog', 'us']
                  });
                  
                  console.log(`✅ Issue créée : ${title} (#${issue.data.number})`);
                } else {
                  console.log(`⏭️ Issue existante : ${title}`);
                }
              } catch (error) {
                console.error(`❌ Erreur pour ${file}:`, error.message);
              }
            }
