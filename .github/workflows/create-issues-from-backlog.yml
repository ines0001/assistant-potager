name: Create Issues from Backlog

on:
  push:
    paths:
      - 'backlog/*.md'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create issues from backlog with labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const backlogDir = './backlog';
            const files = fs.readdirSync(backlogDir).filter(f => f.endsWith('.md'));
            
            for (const file of files) {
              const filePath = path.join(backlogDir, file);
              const content = fs.readFileSync(filePath, 'utf8');
              
              // Extraire le titre (première ligne)
              const lines = content.split('\n');
              const title = lines[0].replace(/^#+\s+/, '').trim();
              
              // ✅ EXTRAIRE LES LABELS
              let labels = ['us', 'backlog'];
              const labelLine = content.match(/Labels GitHub\s*:\s*(.+)/i);
              if (labelLine) {
                const customLabels = labelLine[1]
                  .split(',')
                  .map(l => l.trim())
                  .filter(l => l);
                labels = [...new Set([...labels, ...customLabels])];
              }
              
              console.log(`📝 Fichier: ${file}`);
              console.log(`   Titre: ${title}`);
              console.log(`   Labels: ${labels.join(', ')}`);
              
              try {
                // Vérifier si l'issue existe déjà
                const existingIssues = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'all'
                });
                
                const issueExists = existingIssues.data.some(issue => 
                  issue.title === title
                );
                
                if (!issueExists) {
                  // ✅ CRÉER L'ISSUE AVEC LES LABELS EXTRAITS
                  const issue = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: title,
                    body: content,
                    labels: labels  // Utilise les labels extraits
                  });
                  
                  console.log(`✅ Issue créée: #${issue.data.number}`);
                } else {
                  console.log(`⏭️ Issue existante`);
                }
              } catch (error) {
                console.error(`❌ Erreur: ${error.message}`);
              }
            }
